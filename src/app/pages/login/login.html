<div class="login-component">
      <mat-card>

            <mat-card-header class="padding-m">
                  <mat-card-title>Login de Usuário</mat-card-title>
            </mat-card-header>
            <mat-card-content>
                  <form [formGroup]="form">
                        <mat-form-field appearance="fill" class="full-width">
                              <mat-label>Email</mat-label>
                              <input matInput formControlName="email" placeholder="Digite o seu nome email">

                              @if(emailErrors) {
                              <mat-error>{{ emailErrors }}</mat-error>
                              }
                        </mat-form-field>
                  </form>
                  <input-password-field [control]="passwordControl"></input-password-field>
            </mat-card-content>
            <mat-card-actions>
                  <button matButton="elevated" class="full-width" [disabled]="form.invalid" (click)="submit()">
                        <span class="cad-button-content">
                              {{ isLoading ? "Entrando..." : "Entrar"}}
                              @if (isLoading) {<mat-spinner diameter="20"></mat-spinner>}
                        </span>
                  </button>
            </mat-card-actions>
      </mat-card>
</div>
