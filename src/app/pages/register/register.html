<div class="register-component">
      <mat-card>

            <mat-card-header class="padding-m">
                  <mat-card-title>Cadastro de Usuário</mat-card-title>
            </mat-card-header>
            <mat-card-content>
                  <mat-form-field appearance="fill" class="full-width">
                        <mat-label>Nome Completo</mat-label>
                        <input matInput placeholder="Digite o seu nome completo">
                  </mat-form-field>
                  <mat-form-field appearance="fill" class="full-width">
                        <mat-label>Email</mat-label>
                        <input matInput placeholder="Digite o seu nome email">
                  </mat-form-field>
                  <mat-form-field appearance="fill" class="full-width">
                        <mat-label>Senha</mat-label>
                        <input matInput type="password" placeholder="Cadastre a sua senha">
                  </mat-form-field>
            </mat-card-content>
            <mat-card-actions>
                  <button matButton="elevated" class="full-width">Cadastrar</button>
            </mat-card-actions>
      </mat-card>
</div>
